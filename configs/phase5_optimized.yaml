# Phase 5: Optimized — 50 features, 14 tickers (V/MSFT removed: coin-flip accuracy)
# WF Accuracy: 64.6% | AUC: 0.7185 | Win Rate: 60.1%
# vs Phase4: 63.5% | 0.7278 | 60.3%

# Phase 5.2: Optimized — 53 features, 13 tickers, calibrated
# WF (133 fold): Accuracy 62.9% | Sharpe 14.92 | Win Rate 67.0%
# Removed tickers: MSFT (51.0%), V (50.2%), 6758.T Sony (36.4%)
# Removed features: 19 zero/low-importance

data:
  history_days: 2520   # ~7-10 years of OHLCV for backtesting
  min_history_days: 504

labels:
  horizon: 10
  direction_threshold: 0.03

features:
  tiers: [1, 2, 3, 4, 5, 6]
  max_features: 70
  excluded:
    - "lower_shadow_ratio"
    - "eps_revision_7d"
    - "analyst_net_upgrades"
    - "insider_net_signal"
    - "days_to_earnings"
    - "earnings_proximity"
    - "market_regime_label"
    - "eps_revision_trend_7d"
    - "target_price_gap_change"
    - "news_volume"
    - "insider_signal_proxy"
    - "dist_sma50"
    - "max_drawdown_63d"
    - "price_to_52w_high"
    - "intraday_range"
    - "vix_change_5d"
    - "news_sentiment_avg"
    - "net_income_acceleration"
    - "fear_greed_change_7d"

universe:
  tickers:
    # Removed: MSFT (51.0%), V (50.2%)
    - "GOOGL"
    - "AMZN"
    - "NVDA"
    - "META"
    - "JPM"
    - "COST"
    - "XOM"
    - "CVX"
    - "LLY"
    - "JNJ"
    - "9101.T"
    # Removed: 6758.T Sony (36.4% = worse than coin flip, inverse signal)
    - "8316.T"
    - "8001.T"

backtest:
  confidence_threshold: 0.55
